name: Docker Deploy

# Deploy the freshly-published image to a host over SSH. Runs after "Docker Publish"
# succeeds on main, or manually. Configure these repo secrets first:
#   DEPLOY_HOST     – server hostname / IP
#   DEPLOY_USER     – SSH user
#   DEPLOY_SSH_KEY  – private key for that user
#   DEPLOY_PATH     – folder on the server holding docker-compose.prod.yml + .env
on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Only deploy on a successful publish, or when triggered manually
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
